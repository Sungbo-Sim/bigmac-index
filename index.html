<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Real Big Mac Index</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header" id="header">
    <div class="container header-inner">
      <div class="header-text">
        <h1 class="header-title" data-i18n="title"></h1>
        <p class="header-subtitle" data-i18n="subtitle"></p>
      </div>
      <button class="toggle-btn" id="toggle-lang" aria-label="Toggle language"></button>
    </div>
  </header>

  <main class="main">

    <!-- ===== SECTION: Exchange Rates ===== -->
    <section class="section" id="section-exchange">
      <div class="container">
        <h2 class="section-title" data-i18n="section_exchange"></h2>
        <div class="exchange-layout">
          <!-- LEFT: rate cards -->
          <div class="exchange-left">
            <div class="exchange-top-row">
              <div class="exchange-base-input-wrap">
                <span class="exchange-base-symbol" id="exchange-base-symbol"></span>
                <input type="number" id="exchange-base-input" class="exchange-base-input" min="1" step="1" />
                <span class="exchange-base-label" id="exchange-base-label"></span>
              </div>
              <div class="exchange-timestamp" id="exchange-timestamp"></div>
            </div>
            <div class="exchange-cards" id="exchange-cards"></div>
            <div class="exchange-nav">
              <button class="arrow-btn" id="exchange-prev" aria-label="Previous">&larr;</button>
              <span class="page-indicator" id="exchange-page"></span>
              <button class="arrow-btn" id="exchange-next" aria-label="Next">&rarr;</button>
            </div>
          </div>
          <!-- RIGHT: history chart -->
          <div class="exchange-right-panel" id="exchange-chart-panel">
            <div class="exchange-chart-header">
              <span class="exchange-chart-title" id="exchange-chart-title" data-i18n="chartSelectCountry"></span>
            </div>
            <div class="exchange-period-tabs" id="exchange-period-tabs">
              <button class="period-tab" data-period="3M">3M</button>
              <button class="period-tab active" data-period="6M">6M</button>
              <button class="period-tab" data-period="1Y">1Y</button>
              <button class="period-tab" data-period="3Y">3Y</button>
              <button class="period-tab" data-period="5Y">5Y</button>
            </div>
            <div class="exchange-chart-wrap">
              <canvas id="chart-exchange-history"></canvas>
              <div class="exchange-chart-loading" id="exchange-chart-loading" data-i18n="chartSelectCountry"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== SECTION: Wage Calculator + KPI ===== -->
    <section class="section section-alt" id="section-wage">
      <div class="container">
        <h2 class="section-title" data-i18n="section_wage"></h2>
        <div class="wage-kpi-layout">
          <!-- LEFT: Calculator -->
          <div class="wage-calculator" id="wage-calculator">
            <div class="wage-row">
              <label class="wage-label" data-i18n="selectCountry"></label>
              <select class="wage-select" id="wage-country"></select>
            </div>
            <div class="quick-btns" id="quick-btns">
              <button class="quick-btn active" data-code="KR">🇰🇷</button>
              <button class="quick-btn" data-code="US">🇺🇸</button>
              <button class="quick-btn" data-code="JP">🇯🇵</button>
              <button class="quick-btn" data-code="GB">🇬🇧</button>
              <button class="quick-btn" data-code="EU">🇪🇺</button>
              <button class="quick-btn" data-code="AU">🇦🇺</button>
            </div>
            <div class="wage-row">
              <label class="wage-label" data-i18n="hourlyWage"></label>
              <div class="wage-input-wrap">
                <span class="wage-symbol" id="wage-symbol">₩</span>
                <input type="number" id="wage-input" class="wage-input" value="9860" min="1" step="100" />
                <span class="wage-suffix" data-i18n="perHour"></span>
              </div>
            </div>
            <div class="wage-usd-equiv" id="wage-usd-equiv"></div>
          </div>
          <!-- RIGHT: KPI widgets -->
          <div class="kpi-grid" id="kpi-grid"></div>
        </div>
      </div>
    </section>

    <!-- ===== SECTION: Global Ranking ===== -->
    <section class="section section-alt" id="section-ranking">
      <div class="container">
        <h2 class="section-title" data-i18n="section_ranking"></h2>
        <div class="ranking-layout">
          <!-- LEFT: Top 5 cards -->
          <div class="ranking-left">
            <div class="ranking-tabs" id="ranking-tabs">
              <button class="ranking-tab active" data-tab="cheap" id="tab-cheap"></button>
              <button class="ranking-tab" data-tab="expensive" id="tab-expensive"></button>
            </div>
            <div class="ranking-list" id="ranking-list"></div>
          </div>
          <!-- RIGHT: Bar chart -->
          <div class="ranking-right-panel">
            <div class="chart-wrap ranking-chart-wrap">
              <canvas id="chart-ranking"></canvas>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Price Chart merged into Ranking section above -->

    <!-- ===== SECTION: Continent ===== -->
    <section class="section section-alt" id="section-continent">
      <div class="container">
        <h2 class="section-title" data-i18n="section_continent"></h2>
        <div class="continent-wrap">
          <div class="chart-wrap chart-wrap-donut">
            <canvas id="chart-continent"></canvas>
          </div>
          <div class="chart-wrap" id="continent-bar-wrap" style="display:none;">
            <canvas id="chart-continent-bar"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== SECTION: Valuation ===== -->
    <section class="section" id="section-valuation">
      <div class="container">
        <h2 class="section-title" data-i18n="section_valuation"></h2>
        <div class="valuation-layout">
          <!-- LEFT: Top 5 overvalued + undervalued -->
          <div class="valuation-left" id="valuation-cards"></div>
          <!-- RIGHT: Chart -->
          <div class="valuation-right">
            <div class="chart-wrap valuation-chart-box">
              <div class="valuation-chart-inner" id="valuation-chart-inner">
                <canvas id="chart-valuation"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== SECTION: Big Mac Purchasing Power Map ===== -->
    <section class="section section-alt" id="section-map">
      <div class="container container-wide">
        <h2 class="section-title" data-i18n="section_map"></h2>
        <div class="map-layout">
          <!-- LEFT: Map -->
          <div class="map-left">
            <div class="map-wrap" id="map-wrap">
              <svg id="world-map"></svg>
              <div class="map-tooltip" id="map-tooltip"></div>
              <div class="map-zoom-controls">
                <button class="map-zoom-btn" id="map-zoom-in" aria-label="Zoom in">+</button>
                <button class="map-zoom-btn" id="map-zoom-out" aria-label="Zoom out">−</button>
                <button class="map-zoom-btn map-zoom-reset" id="map-zoom-reset" aria-label="Reset zoom">↺</button>
              </div>
            </div>
            <div class="map-legend" id="map-legend"></div>
          </div>
          <!-- RIGHT: Panel -->
          <div class="map-right" id="map-right">
            <div class="map-search-wrap">
              <label class="map-search-label" data-i18n="mapSearchLabel"></label>
              <select class="map-search-select" id="map-search"></select>
            </div>
            <div class="map-card" id="map-card">
              <div class="map-card-placeholder" id="map-card-placeholder">
                <div class="map-card-placeholder-icon">🌍</div>
                <p data-i18n="mapClickHint"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p data-i18n="footer"></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="app.js"></script>
</body>
</html>
